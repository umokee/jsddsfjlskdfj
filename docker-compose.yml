version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    restart: unless-stopped
    environment:
      - TASK_MANAGER_API_KEY=${TASK_MANAGER_API_KEY:-your-secret-key-change-me}
      - TASK_MANAGER_LOG_DIR=/var/log/task-manager
      - DATABASE_URL=sqlite:////app/data/task_manager.db
    volumes:
      - ./data:/app/data
      - ./logs:/var/log/task-manager
    networks:
      - taskmanager-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - taskmanager-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  taskmanager-network:
    driver: bridge

volumes:
  data:
  logs:
